name: "Staging Pipeline"

on:
  push:
    branches: [ "stg" ]
  pull_request:
    types: [ opened, synchronize, reopened, ready_for_review ]
    branches: [ "stg" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/ngominhdong99/lwac-backend
  IMAGE_FRONTEND: ghcr.io/ngominhdong99/lwac-frontend
  SOURCE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
  SOURCE_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || github.ref_name }}

permissions:
  contents: read
  packages: write

jobs:
  quality-check:
    name: Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          ref: ${{ env.SOURCE_SHA }}

      - name: Install uv
        run: |
          pip install uv
          uv python install 3.13

      - name: Run Backend Checks
        working-directory: backend
        run: |
          uv sync --frozen
          uv run ruff check .
          uv run pytest -q

  build-and-push:
    name: Build And Push Images
    needs: quality-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          ref: ${{ env.SOURCE_SHA }}

      - name: Set tag
        run: echo "SHA=${SOURCE_SHA::7}" >> $GITHUB_ENV

      - name: Login To GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build And Push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ env.IMAGE_BACKEND }}:stg,${{ env.IMAGE_BACKEND }}:stg-${{ env.SHA }}
          cache-from: |
            type=gha,scope=stg-backend
            type=registry,ref=${{ env.IMAGE_BACKEND }}:stg-buildcache
          cache-to: |
            type=gha,mode=max,scope=stg-backend
            type=registry,ref=${{ env.IMAGE_BACKEND }}:stg-buildcache,mode=max

      - name: Build And Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ env.IMAGE_FRONTEND }}:stg,${{ env.IMAGE_FRONTEND }}:stg-${{ env.SHA }}
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
          cache-from: |
            type=gha,scope=stg-frontend
            type=registry,ref=${{ env.IMAGE_FRONTEND }}:stg-buildcache
          cache-to: |
            type=gha,mode=max,scope=stg-frontend
            type=registry,ref=${{ env.IMAGE_FRONTEND }}:stg-buildcache,mode=max

  deploy:
    name: Deploy To STG
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: STG

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Prepare SHA tag
        run: |
          echo "SHA=${SOURCE_SHA::7}" >> $GITHUB_ENV
          echo "SOURCE_REF=${SOURCE_REF}" >> $GITHUB_ENV

      - name: Connect To Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Verify Environment
        run: |
          echo "======================================================="
          echo "🚀 DEPLOYING TO ENVIRONMENT: STAGING"
          echo "IP Target: 100.109.81.74"
          echo "======================================================="

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "100.109.81.74" >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        run: |
          ssh yuntuobiedakid@"100.109.81.74" << EOF2
            set -eux
            DEPLOY_DIR="${{ vars.DEPLOY_PATH }}"
            DEPLOY_DIR="\${DEPLOY_DIR:-/srv/lwac}"
            echo "===== SERVER CONTEXT ====="
            uname -n || true
            whoami || true
            pwd || true
            date || true
            echo "DEPLOY_DIR=\$DEPLOY_DIR"

            mkdir -p "\$(dirname "\$DEPLOY_DIR")"
            if [ ! -d "\$DEPLOY_DIR" ]; then
              echo "Creating deploy directory: \$DEPLOY_DIR"
              mkdir -p "\$DEPLOY_DIR" || {
                echo "ERROR: Cannot create DEPLOY_PATH=\$DEPLOY_DIR"
                echo "Provision it first, for example:"
                echo "  sudo mkdir -p \$DEPLOY_DIR"
                echo "  sudo chown -R \$(whoami):\$(id -gn) \$DEPLOY_DIR"
                exit 1
              }
            fi

            if [ ! -w "\$DEPLOY_DIR" ]; then
              echo "ERROR: DEPLOY_PATH is not writable: \$DEPLOY_DIR"
              echo "Current user: \$(whoami)"
              echo "Directory details:"
              ls -ld "\$DEPLOY_DIR" || true
              echo "Fix it with something like:"
              echo "  sudo chown -R \$(whoami):\$(id -gn) \$DEPLOY_DIR"
              exit 1
            fi

            if [ ! -d "\$DEPLOY_DIR/.git" ]; then
              git init "\$DEPLOY_DIR"
            fi

            cd \$DEPLOY_DIR
            git remote get-url origin >/dev/null 2>&1 \
              && git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" \
              || git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
            echo "===== GIT BEFORE ====="
            git status --short --branch || true
            git rev-parse HEAD || true
            git fetch --all --prune
            git fetch origin "${{ env.SOURCE_REF }}"
            git checkout -B "${{ env.SOURCE_REF }}" "origin/${{ env.SOURCE_REF }}"
            git reset --hard "${{ env.SOURCE_SHA }}"
            echo "===== GIT AFTER ====="
            git status --short --branch || true
            git rev-parse HEAD || true
            git log --oneline -n 3 || true
            echo "===== DOCKER BEFORE LOGIN ====="
            docker images --format 'table {{.Repository}}\t{{.Tag}}\t{{.ID}}\t{{.CreatedSince}}' | (grep -E 'REPOSITORY|lwac-(frontend|backend)' || true)
            docker ps -a --format 'table {{.Names}}\t{{.Image}}\t{{.Status}}\t{{.Ports}}' | (grep -E 'NAMES|lwac' || true)

            echo '${{ secrets.GITHUB_TOKEN }}' | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            {
              printf '%s\n' "VITE_API_URL=${{ secrets.VITE_API_URL }}"
              printf '%s\n' "PLATFORM_URL=${{ secrets.PLATFORM_URL }}"
              printf '%s\n' "HTTP_PORT=80"
              printf '%s\n' "BACKEND_PORT=8000"
              printf '%s\n' "DB_PASS=${{ secrets.DB_PASS }}"
              printf '%s\n' "DB_USER=${{ secrets.DB_USER }}"
              printf '%s\n' "DB_NAME=${{ secrets.DB_NAME }}"
              printf '%s\n' "DATABASE_URL=${{ secrets.DATABASE_URL }}"
              printf '%s\n' "SECRET_KEY=${{ secrets.SECRET_KEY }}"
              printf '%s\n' "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}"
              printf '%s\n' "SMTP_SERVER=${{ secrets.SMTP_SERVER }}"
              printf '%s\n' "SMTP_PORT=${{ secrets.SMTP_PORT }}"
              printf '%s\n' "EMAIL_USERNAME=${{ secrets.EMAIL_USERNAME }}"
              printf '%s\n' "EMAIL_PASSWORD=${{ secrets.EMAIL_PASSWORD }}"
              printf '%s\n' "EMAIL_FROM_NAME=${{ secrets.EMAIL_FROM_NAME }}"
              printf '%s\n' "EMAIL_COACH_NAME=${{ secrets.EMAIL_COACH_NAME }}"
              printf '%s\n' "BACKEND_TAG=stg-${{ env.SHA }}"
              printf '%s\n' "FRONTEND_TAG=stg-${{ env.SHA }}"
            } > /dev/shm/.env.lwac-stg

            echo "===== ENV FILE ====="
            cat /dev/shm/.env.lwac-stg
            echo "===== DOCKER PULL ====="
            docker compose --env-file /dev/shm/.env.lwac-stg pull
            echo "===== DOCKER UP ====="
            docker compose --env-file /dev/shm/.env.lwac-stg -p lwac-stg up -d --remove-orphans
            echo "===== DOCKER AFTER UP ====="
            docker compose --env-file /dev/shm/.env.lwac-stg -p lwac-stg ps || true
            docker ps -a --format 'table {{.Names}}\t{{.Image}}\t{{.Status}}\t{{.Ports}}' | (grep -E 'NAMES|lwac' || true)
            echo "===== PORT CHECK ====="
            ss -ltnp | (grep ':80 ' || true)

            rm -f /dev/shm/.env.lwac-stg

            docker logout ghcr.io
            docker image prune -a -f
          EOF2
