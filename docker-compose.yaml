services:
  frontend:
    image: ghcr.io/ngominhdong99/lwac-frontend:${FRONTEND_TAG:-latest}
    restart: "no"
    volumes:
      - frontend_dist:/usr/share/nginx/html
    networks:
      - lwac-net

  backend:
    image: ghcr.io/ngominhdong99/lwac-backend:${BACKEND_TAG:-latest}
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SECRET_KEY=${SECRET_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - SMTP_SERVER=${SMTP_SERVER}
      - SMTP_PORT=${SMTP_PORT}
      - EMAIL_USERNAME=${EMAIL_USERNAME}
      - EMAIL_PASSWORD=${EMAIL_PASSWORD}
      - EMAIL_FROM_NAME=${EMAIL_FROM_NAME}
      - EMAIL_COACH_NAME=${EMAIL_COACH_NAME}
      - PLATFORM_URL=${PLATFORM_URL}
    volumes:
      - static_data:/app/static
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    depends_on:
      db:
        condition: service_healthy
      db_migrate:
        condition: service_completed_successfully
    networks:
      - lwac-net

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    volumes:
      - ./backend/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend_dist:/usr/share/nginx/html:ro
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      frontend:
        condition: service_completed_successfully
      backend:
        condition: service_started
    networks:
      - lwac-net

  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      - POSTGRES_PASSWORD=${DB_PASS}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_DB=${DB_NAME}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    networks:
      - lwac-net

  db_migrate:
    image: ghcr.io/ngominhdong99/lwac-backend:${BACKEND_TAG:-latest}
    command: python -m alembic upgrade head
    environment:
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - lwac-net

volumes:
  static_data:
  postgres_data:
  frontend_dist:

networks:
  lwac-net: